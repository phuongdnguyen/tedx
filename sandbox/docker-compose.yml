version: '3.8'

services:
  temporal-cluster-1:
    image: temporalio/temporal:latest
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233" # gRPC port
      - "8233:8233" # Web UI port
    networks:
      - temporal-sandbox-network

  temporal-cluster-2:
    image: temporalio/temporal:latest
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7234:7233" # gRPC port
      - "8234:8233" # Web UI port
    networks:
      - temporal-sandbox-network

networks:
  temporal-sandbox-network:
    driver: bridge
